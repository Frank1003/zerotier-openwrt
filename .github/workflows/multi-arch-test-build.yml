name: Multi-arch test build

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.arch }} build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a72-24.10.6
          - aarch64_cortex-a53-24.10.6
          - arm_cortex-a7_neon-vfpv4-24.10.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest upstream version and hash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-latest-zero-tier.mjs zerotier/Makefile

      - name: Build package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          PACKAGES: zerotier
          BUILD_LOG: 1

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: zerotier-${{ matrix.arch }}
          path: |
            bin/packages/**/zerotier_*.apk
            bin/packages/**/zerotier_*.ipk
          if-no-files-found: error

      - name: Store logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.arch }}
          path: |
            logs/
            PKG-INFO
